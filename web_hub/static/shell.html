<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CryptoWeb Hub — Shell</title>
  <style>
    :root { color-scheme: dark; --bg: #0f1419; --fg: #e6edf3; --accent: #3b82f6; --muted: #8b9cb3; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; font-family: system-ui, Segoe UI, sans-serif; background: var(--bg); color: var(--fg);
      display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
    p { color: var(--muted); max-width: 36rem; text-align: center; }
    pre { background: #1a2332; padding: 1rem; border-radius: 8px; border: 1px solid #2d3a4d; }
    a { color: var(--accent); }
  </style>
</head>
<body>
  <p><a href="/">← الواجهة الرئيسية</a></p>
  <p>Minimal health check page.</p>
  <pre id="health">…</pre>
  <script>
    fetch("/api/health").then(r => r.json()).then(j => { document.getElementById("health").textContent = JSON.stringify(j, null, 2); });
  </script>
</body>
</html>
