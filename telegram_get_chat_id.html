<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الحصول على معرّف المحادثة (Chat ID)</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; background: #1a1a2e; color: #eee; }
    h1 { font-size: 1.2rem; color: #88aacc; }
    label { display: block; margin-top: 12px; margin-bottom: 4px; }
    input { width: 100%; padding: 10px; font-size: 14px; background: #252a32; border: 1px solid #353b45; border-radius: 6px; color: #eee; box-sizing: border-box; }
    button { margin-top: 16px; padding: 12px 24px; font-size: 14px; background: #0d7dd6; color: white; border: none; border-radius: 8px; cursor: pointer; }
    button:hover { background: #2a9fff; }
    .hint { font-size: 12px; color: #8b95a0; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>الحصول على معرّف المحادثة (Chat ID)</h1>
  <p class="hint">الصق رمز البوت من BotFather في الحقل أدناه ثم اضغط الزر. سيفتح الرابط في المتصفح.</p>
  <label for="token">رمز البوت (Bot Token):</label>
  <input type="text" id="token" placeholder="مثال: 123456789:ABCdefGHI..." autocomplete="off">
  <button onclick="openLink()">فتح الرابط واظهار النتيجة</button>
  <p class="hint">بعد فتح الصفحة: أرسل /start للبوت في تيليجرام ثم حدّث الصفحة (F5). ابحث عن "chat":"id" وانسخ الرقم.</p>
  <script>
    function openLink() {
      var token = document.getElementById('token').value.trim();
      if (!token) {
        alert('أدخل رمز البوت أولاً.');
        return;
      }
      var url = 'https://api.telegram.org/bot' + token + '/getUpdates';
      window.open(url, '_blank');
    }
  </script>
</body>
</html>
